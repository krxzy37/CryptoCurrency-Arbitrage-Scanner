services:
  crypto-scanner-postgres:
    image: postgres:18.3-bookworm
    container_name: crypto-scanner-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  crypto-scanner-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: crypto-scanner-port-forwarder
    command:
      - tcp-listen:5432,fork,reuseaddr
      - tcp-connect:crypto-scanner-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"